<!doctype html>
<html lang="id">

<head>
  <style>
    /* Style Khusus Preview agar mirip Kertas Surat */
    #previewArea {
      background-color: #fff;
      font-family: "Times New Roman", Times, serif;
      color: #000;
      line-height: 1.3;
      padding: 1cm !important;
      /* Margin seperti di foto */
      border: 1px solid #ddd;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .kop-surat {
      display: flex;
      align-items: center;
      border-bottom: 3px double #000;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    .kop-logo {
      width: 70px;
      margin-right: 15px;
      margin-left: 30px;
    }

    .kop-text {
      flex: 1;
      text-align: center;
    }

    .kop-text h3 {
      font-size: 14pt;
      margin: 0;
      font-weight: bold;
    }

    .kop-text h4 {
      font-size: 16pt;
      margin: 0;
      font-weight: bold;
    }

    .kop-text p {
      font-size: 10pt;
      margin: 0;
      font-style: italic;
    }

    .judul-surat {
      text-align: center;
      margin-bottom: 20px;
    }

    .judul-surat u {
      font-size: 14pt;
      font-weight: bold;
    }

    .judul-surat p {
      font-size: 11pt;
      margin-top: -5px;
    }

    .tabel-data {
      width: 100%;
      margin-left: 30px;
      margin-bottom: 15px;
    }

    .tabel-data td {
      vertical-align: top;
      padding: 2px 0;
      font-size: 12pt;
    }

    .label-col {
      width: 180px;
    }

    .sep-col {
      width: 20px;
      text-align: center;
    }

    .isi-surat {
      text-align: justify;
      text-indent: 40px;
      font-size: 11pt;
    }

    .ttd-container {
      float: right;
      width: 250px;
      margin-top: 20px;
      text-align: left;
      font-size: 11pt;
    }
  </style>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buat Surat - Portal Desa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>

<body class="hold-transition layout-top-nav">
  <div class="wrapper">
    <nav class="main-header navbar navbar-expand-md navbar-light navbar-white">
      <div class="container">

        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="index.html" class="nav-link">
              <i class="fas fa-arrow-left"></i> Kembali ke Beranda
            </a>
          </li>
        </ul>

        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="#" role="button" onclick="toggleDarkMode()" title="Ubah Tema">
              <i id="darkModeIcon" class="fas fa-moon"></i>
            </a>
          </li>
        </ul>

      </div>
    </nav>



    <div class="content-wrapper">
      <section class="content">
        <div class="container-fluid pt-4">

          <div id="menuPilihan" class="row justify-content-center">
            <div class="col-md-8">
              <div class="card card-outline card-primary">
                <div class="card-header text-center">
                  <h3>Pilih Jenis Surat</h3>
                </div>
                <div class="card-body text-center" style="padding: 50px;">
                  <p>Silakan pilih surat yang ingin Anda buat:</p>
                  <br>
                  <div class="row">
                    <div class="col-md-6">
                      <button class="btn btn-lg btn-primary btn-block p-4 mb-3" onclick="pilihSurat('sku')">
                        <i class="fas fa-store fa-3x mb-3"></i><br>
                        Surat Keterangan Usaha
                      </button>
                    </div>
                    <div class="col-md-6">
                      <button class="btn btn-lg btn-success btn-block p-4" onclick="pilihSurat('skd')">
                        <i class="fas fa-map-marker-alt fa-3x mb-3"></i><br>
                        Surat Keterangan Domisili
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div id="formArea" class="row" style="display: none;">
            <div class="col-md-6">
              <div class="card card-primary">
                <div class="card-header d-flex justify-content-between align-items-center">
                  <h3 class="card-title" id="judulForm">Form Surat</h3>
                  <button class="btn btn-sm btn-warning" onclick="kembaliKeMenu()">
                    <i class="fas fa-arrow-left"></i> Kembali
                  </button>
                </div>
                <div class="card-body">
                  <form id="suratForm">
                    <input type="hidden" id="jenis_surat" value="">

                    <h5 class="text-primary"><i class="fas fa-user"></i> Data Pribadi</h5>
                    <hr>

                    <div class="form-group">
                      <label>Nama Lengkap</label>
                      <input class="form-control" id="nama" placeholder="Sesuai KTP" required>
                    </div>

                    <div class="row">
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>NIK</label>
                          <div class="input-group">
                            <input class="form-control" id="nik" type="number" placeholder="Masukkan NIK..." required>
                            <div class="input-group-append">
                              <button class="btn btn-primary" type="button" onclick="cariWarga()">
                                <i class="fas fa-search"></i> Cari
                              </button>
                            </div>
                          </div>
                          <small class="text-muted">Klik cari untuk isi otomatis data warga</small>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Jenis Kelamin</label>
                          <select class="form-control" id="jenis_kelamin">
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Tempat Lahir</label>
                          <input class="form-control" id="tempat_lahir">
                        </div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Tanggal Lahir</label>
                          <input class="form-control" type="date" id="tgl_lahir">
                        </div>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Agama</label>
                          <select class="form-control" id="agama">
                            <option value="Islam">Islam</option>
                            <option value="Kristen">Kristen</option>
                            <option value="Katolik">Katolik</option>
                            <option value="Hindu">Hindu</option>
                            <option value="Buddha">Buddha</option>
                            <option value="Konghucu">Konghucu</option>
                          </select>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Status Perkawinan</label>
                          <select class="form-control" id="status_perkawinan">
                            <option value="Belum Kawin">Belum Kawin</option>
                            <option value="Kawin">Kawin</option>
                            <option value="Cerai Hidup">Cerai Hidup</option>
                            <option value="Cerai Mati">Cerai Mati</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="form-group">
                      <label>Pekerjaan</label>
                      <input class="form-control" id="pekerjaan" value="Wiraswasta">
                    </div>

                    <div class="form-group">
                      <label>Alamat Lengkap</label>
                      <textarea class="form-control" id="alamat" rows="2" required></textarea>
                    </div>

                    <div class="form-group">
                      <label>Kode POS</label>
                      <input class="form-control" id="kode_pos" type="number" placeholder="Contoh: 29563">
                    </div>

                    <br>
                    <h5 class="text-primary"><i class="fas fa-file-alt"></i> Detail Surat</h5>
                    <hr>

                    <div id="kolomUsaha">
                      <div class="form-group">
                        <label>Nama Usaha</label>
                        <input class="form-control" id="nama_usaha"
                          placeholder="Contoh: Jualan Sembako / Bengkel Motor">
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6">
                        <div class="form-group"><label>Tanggal Surat</label><input type="date" class="form-control"
                            id="tanggal"></div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Penanda Tangan</label>
                          <select class="form-control" id="penandatangan">
                            <option value="kades">Kepala Desa</option>
                            <option value="sekdes">Sekretaris Desa (An. Kepala Desa)</option>
                          </select>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
                <div class="card-footer">
                  <button type="button" id="previewBtn" class="btn btn-info">
                    <i class="fas fa-eye"></i> Preview / Update
                  </button>

                  <button type="button" id="pdfBtn" class="btn btn-success">
                    <i class="fas fa-file-pdf"></i> Simpan PDF
                  </button>

                  <button type="button" id="printBtn" class="btn btn-primary">
                    <i class="fas fa-print"></i> Cetak
                  </button>

                  <button type="button" id="submitBtn" class="btn btn-success" style="margin-left: 10px;">
                    <i class="fas fa-save"></i> Simpan ke Database
                  </button>

                  <div id="submitMsg" class="mt-2"></div>
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Preview Surat</h3>
                </div>
                <div class="card-body" id="previewArea">
                  <p class="text-muted">Klik "Preview" untuk melihat hasil surat di sini.</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <footer class="main-footer">
          <div class="float-right d-none d-sm-inline">Portal Desa</div><strong>&copy; <span id="year2"></span></strong>
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js" defer></script>
    <script src="assets/js/app.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const yearEl = document.getElementById('year2');
        if (yearEl) {
          yearEl.innerText = new Date().getFullYear();
        }
        if (typeof updateOnlineStatus === 'function') {
          updateOnlineStatus();
        }
      });
      function toggleDarkMode() {
        const body = document.body;
        const nav = document.querySelector('.main-header'); // Ambil elemen Navbar
        const icon = document.getElementById('darkModeIcon');

        // Toggle Class di Body
        const isDark = body.classList.toggle('dark-mode');

        if (isDark) {
          // JIKA MODENYA GELAP:
          // 1. Ganti Ikon jadi Matahari
          if (icon) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }

          // 2. Ubah Navbar jadi Gelap (PENTING!)
          if (nav) {
            nav.classList.remove('navbar-white', 'navbar-light');
            nav.classList.add('navbar-dark');
          }

          // 3. Simpan
          localStorage.setItem('theme', 'dark');

        } else {
          // JIKA MODENYA TERANG:
          // 1. Ganti Ikon jadi Bulan
          if (icon) { icon.classList.remove('fa-sun'); icon.classList.add('fa-moon'); }

          // 2. Ubah Navbar jadi Putih Kembali
          if (nav) {
            nav.classList.remove('navbar-dark');
            nav.classList.add('navbar-white', 'navbar-light');
          }

          // 3. Simpan
          localStorage.setItem('theme', 'light');
        }
      }

      // === CEK MEMORI SAAT HALAMAN DIBUKA (Agar tidak reset saat refresh) ===
      document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('theme') === 'dark') {
          // Terapkan Gelap ke Body
          document.body.classList.add('dark-mode');

          // Terapkan Gelap ke Navbar (PENTING!)
          const nav = document.querySelector('.main-header');
          if (nav) {
            nav.classList.remove('navbar-white', 'navbar-light');
            nav.classList.add('navbar-dark');
          }

          // Terapkan Ikon Matahari
          const icon = document.getElementById('darkModeIcon');
          if (icon) {
            icon.classList.remove('fa-moon');
            icon.classList.add('fa-sun');
          }
        }
      });
    </script>
</body>

</html>
